server.port=8080
spring.application.name=sss
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/Gayatri_Member_Association?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER:com.mysql.cj.jdbc.Driver}


spring.jpa.properties.hibernate.id.new_generator_mappings=false





#JPA Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.generate-ddl=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


twilio.account_sid=${TWILIO_ACCOUNT_SID:}
twilio.auth_token=${TWILIO_AUTH_TOKEN:}
twilio.phone_number=${TWILIO_PHONE_NUMBER:}
twilio.whatsapp.number=${TWILIO_WHATSAPP_NUMBER:}




